name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: |
        npm install
        
    - name: Add iOS platform
      run: |
        npx cap add ios
        
    - name: Sync Capacitor
      run: |
        npx cap sync ios
        
    - name: Build unsigned IPA
      run: |
        cd ios/App
        # 直接构建 .app 目录
        xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          | xcpretty
        
        # 找到 .app 文件并打包成 IPA
        APP_PATH=$(find build/Build/Products -name "App.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "Error: App.app not found"
          exit 1
        fi
        echo "Found app at: $APP_PATH"
        
        # 创建 Payload 目录并打包
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r ../../../WheelPulseCalc-iOS.ipa Payload
        cd ../..
        
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: WheelPulseCalc-iOS
        path: WheelPulseCalc-iOS.ipa
        
    - name: Upload to Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        files: WheelPulseCalc-iOS.ipa
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
